<!-- profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - SAMBANDH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav id="global-nav"></nav>
    <aside id="global-sidebar"></aside>
    
    <div class="max-w-7xl mx-auto flex">
        <main class="flex-1 w-full sm:ml-64 px-4 sm:px-6 py-6 pb-20 sm:pb-6 mt-16 max-w-3xl fade-in">
            
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden relative">
                <!-- Cover Image (Gradient) -->
                <div class="h-32 bg-gradient-to-r from-blue-500 to-purple-600"></div>
                
                <div class="px-6 pb-6 relative">
                    <!-- Profile Header -->
                    <div class="flex justify-between items-end -mt-12 mb-4">
                        <img id="prof-avatar" src="" class="w-24 h-24 rounded-full border-4 border-white shadow-md bg-white object-cover">
                        <button onclick="Auth.logout()" class="text-red-600 font-bold bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg border border-red-200 transition">Log Out</button>
                    </div>
                    
                    <div class="mb-6">
                        <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                            <span id="prof-username"></span>
                            <span id="prof-premium-badge" class="hidden text-yellow-500 text-lg" title="Premium Member">★</span>
                        </h1>
                        <p id="prof-role" class="text-sm font-semibold uppercase tracking-wider text-gray-500 mt-1"></p>
                    </div>

                    <!-- Stats Grid -->
                    <div class="grid grid-cols-3 gap-4 border-t border-gray-100 pt-6">
                        <div class="text-center">
                            <span id="stat-posts" class="block text-2xl font-bold text-gray-900">0</span>
                            <span class="text-xs text-gray-500 uppercase font-bold tracking-wide">Global Posts</span>
                        </div>
                        <div class="text-center border-x border-gray-100">
                            <span id="stat-questions" class="block text-2xl font-bold text-gray-900">0</span>
                            <span class="text-xs text-gray-500 uppercase font-bold tracking-wide">Questions</span>
                        </div>
                        <div class="text-center">
                            <span id="stat-answers" class="block text-2xl font-bold text-gray-900">0</span>
                            <span class="text-xs text-gray-500 uppercase font-bold tracking-wide">Answers</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Premium CTA block -->
            <div id="premium-cta" class="mt-6 bg-gradient-to-br from-yellow-50 to-orange-50 border border-yellow-200 p-6 rounded-2xl shadow-sm text-center">
                <h3 class="text-lg font-bold text-yellow-800 mb-2">Upgrade your SAMBANDH Experience</h3>
                <p class="text-sm text-yellow-700 mb-4">Get the premium badge, remove all ads, and support the community.</p>
                <a href="premium.html" class="inline-block bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2.5 px-6 rounded-lg shadow-sm transition">View Premium Plans</a>
            </div>

        </main>
    </div>

    <nav id="global-mobile-nav"></nav>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.requireAuth();
            const db = getDB();

            // Populate Info
            document.getElementById('prof-avatar').src = user.avatar;
            document.getElementById('prof-username').textContent = user.username;
            
            const roleEl = document.getElementById('prof-role');
            if(user.role === 'admin') {
                roleEl.textContent = 'Site Administrator';
                roleEl.classList.add('text-blue-600');
            } else {
                roleEl.textContent = 'Community Member';
            }

            if(user.isPremium) {
                document.getElementById('prof-premium-badge').classList.remove('hidden');
                document.getElementById('premium-cta').classList.add('hidden'); // Hide CTA if already premium
            }

            // Calculate Stats
            const userPosts = db.posts.filter(p => p.authorId === user.id).length;
            const userQs = db.questions.filter(q => q.authorId === user.id).length;
            
            let userAnswers = 0;
            db.questions.forEach(q => {
                userAnswers += q.answers.filter(a => a.authorId === user.id).length;
            });

            document.getElementById('stat-posts').textContent = userPosts;
            document.getElementById('stat-questions').textContent = userQs;
            document.getElementById('stat-answers').textContent = userAnswers;
        });
    </script>
</body>
</html>
