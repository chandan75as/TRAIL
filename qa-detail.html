<!-- qa-detail.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question - SAMBANDH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav id="global-nav"></nav>
    <aside id="global-sidebar"></aside>
    
    <div class="max-w-7xl mx-auto flex">
        <main class="flex-1 w-full sm:ml-64 px-0 sm:px-6 py-6 pb-20 sm:pb-6 mt-16 max-w-4xl fade-in">
            
            <a href="qa.html" class="inline-flex items-center gap-2 text-indigo-600 font-medium hover:underline mb-4 ml-4 sm:ml-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to all questions
            </a>

            <!-- The Main Question -->
            <div id="question-header" class="bg-white p-6 sm:rounded-xl shadow-sm border-y sm:border border-gray-200 mb-6">
                <!-- Injected via qa.js -->
            </div>

            <!-- Answers Section -->
            <div class="mb-4 ml-4 sm:ml-0 flex items-center gap-2">
                <h3 class="text-lg font-bold text-gray-900" id="answers-count">0 Answers</h3>
            </div>
            
            <div id="answers-container" class="space-y-4 mb-8">
                <!-- Answers injected via qa.js -->
            </div>

            <!-- Submit Answer Form -->
            <div class="bg-white p-6 sm:rounded-xl shadow-sm border-y sm:border border-gray-200">
                <h4 class="font-bold text-gray-900 mb-3">Your Answer</h4>
                <form id="submitAnswerForm" class="space-y-3">
                    <textarea id="answerContent" rows="4" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="Share your solution or expertise here..."></textarea>
                    <div class="flex justify-end">
                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                            Post Answer
                        </button>
                    </div>
                </form>
            </div>

        </main>
    </div>

    <nav id="global-mobile-nav"></nav>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/qa.js"></script>
</body>
</html>
