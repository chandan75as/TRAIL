<!-- qa.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A - SAMBANDH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav id="global-nav"></nav>
    <aside id="global-sidebar"></aside>
    
    <div class="max-w-7xl mx-auto flex">
        <main class="flex-1 w-full sm:ml-64 px-0 sm:px-6 py-6 pb-20 sm:pb-6 mt-16 max-w-4xl fade-in">
            
            <!-- Ask a Question Section -->
            <div class="bg-white p-6 sm:rounded-xl shadow-sm border-y sm:border border-gray-200 mb-6">
                <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                    <svg class="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Ask the Community
                </h2>
                <form id="askQuestionForm" class="space-y-4">
                    <input type="text" id="qTitle" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="What is your question? (e.g., How to fix a leaky faucet?)">
                    <textarea id="qContent" rows="3" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Provide more details to help others understand your problem..."></textarea>
                    <div class="flex justify-end">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                            Post Question
                        </button>
                    </div>
                </form>
            </div>

            <!-- List of Questions -->
            <div id="questions-container" class="space-y-4">
                <!-- Injected via qa.js -->
            </div>

        </main>

        <!-- Right Side Ad Spaces -->
        <div class="pt-20 pr-4 mt-2">
            <aside id="global-ads"></aside>
        </div>
    </div>

    <nav id="global-mobile-nav"></nav>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/qa.js"></script>
</body>
</html>
