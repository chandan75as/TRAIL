<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SAMBANDH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav id="global-nav"></nav>
    <aside id="global-sidebar"></aside>
    
    <div class="max-w-7xl mx-auto flex">
        <main class="flex-1 w-full sm:ml-64 px-4 sm:px-6 py-6 pb-20 sm:pb-6 mt-16 max-w-4xl fade-in">
            
            <div class="mb-6 flex items-center gap-3">
                <div class="p-2 bg-blue-100 text-blue-600 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Moderation Dashboard</h1>
                    <p class="text-gray-500 text-sm">Review pending submissions before they go live.</p>
                </div>
            </div>

            <div id="pending-container" class="space-y-4">
                <!-- Pending posts injected here -->
            </div>

        </main>
    </div>

    <nav id="global-mobile-nav"></nav>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
