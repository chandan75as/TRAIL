<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SAMBANDH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 fade-in">
        <div class="text-center mb-8">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjTQS9RNhPOdTRuiW2ZiZ3zcQJFHHPUI35HNzgAfSV-0X786dcYbJ7muRBVmRUtNDxqxq_IDAqZw3nLSWbvoUJsiX24Pwt57sIEbQcn-b5AjdpVwiTkenznO-ebkSIObgMtzMnHxo7Ym8vTpUTGcfpS5Ven1LjnYxgbbpzH80c3RdaJPvKtdhJNwx4_gchJ/w640-h640/5146f3f2-7b48-4e8e-863b-ba8b25fcaaee.jpg" alt="SAMBANDH Logo" class="w-20 h-20 mx-auto rounded-xl object-cover mb-4 shadow-sm">
            <h1 class="text-2xl font-bold text-gray-900">Welcome to SAMBANDH</h1>
            <p class="text-gray-500 mt-2 text-sm">Discover, solve, and connect.</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="admin or john_doe">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="password123">
            </div>

            <div id="error-msg" class="text-red-500 text-sm hidden font-medium text-center">Invalid username or password.</div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors duration-200">
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-gray-600 mt-6">
            Don't have an account? <a href="register.html" class="text-blue-600 hover:underline font-medium">Register here</a>
        </p>
    </div>

    <!-- Core Scripts -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.getCurrentUser()) window.location.href = 'index.html';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (Auth.login(user, pass)) {
                window.location.href = 'index.html';
            } else {
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
