<!-- chat.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat - SAMBANDH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen overflow-hidden">

    <nav id="global-nav"></nav>
    <aside id="global-sidebar"></aside>
    
    <div class="max-w-7xl mx-auto flex h-screen pt-16">
        <!-- Main Chat Area -->
        <main class="flex-1 w-full sm:ml-64 flex flex-col fade-in h-full relative">
            
            <!-- Chat Header -->
            <div class="bg-white border-b border-gray-200 p-4 shadow-sm z-10">
                <h1 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                    <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"></path></svg>
                    Global Lounge
                </h1>
                <p class="text-xs text-gray-500">Open conversation for all SAMBANDH members.</p>
            </div>

            <!-- Messages Window -->
            <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 pb-32 sm:pb-24 bg-gray-50">
                <!-- Messages injected via chat.js -->
            </div>

            <!-- Input Area -->
            <div class="absolute bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 pb-20 sm:pb-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <form id="chatForm" class="flex gap-2 max-w-4xl mx-auto">
                    <input type="text" id="chatInput" required autocomplete="off" class="flex-1 px-4 py-3 border border-gray-300 rounded-full focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all shadow-inner" placeholder="Type your message...">
                    <button type="submit" class="bg-green-600 hover:bg-green-700 text-white p-3 rounded-full shadow-md transition-transform transform hover:scale-105 flex items-center justify-center w-12 h-12 shrink-0">
                        <svg class="w-5 h-5 translate-x-[-1px] translate-y-[1px]" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                    </button>
                </form>
            </div>

        </main>
        
        <!-- Ad Space (Hidden on very small screens to prioritize chat) -->
        <div class="pt-4 pr-4 hidden lg:block border-l border-gray-200 bg-white shadow-sm z-10">
            <aside id="global-ads"></aside>
        </div>
    </div>

    <nav id="global-mobile-nav"></nav>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
