<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SAMBANDH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 fade-in">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Join SAMBANDH</h1>
            <p class="text-gray-500 mt-2 text-sm">Create an account to join the community.</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Choose Username</label>
                <input type="text" id="username" required minlength="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="your_username">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Create Password</label>
                <input type="password" id="password" required minlength="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="••••••••">
            </div>

            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" id="confirm_password" required minlength="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="••••••••">
            </div>

            <div id="error-msg" class="text-red-500 text-sm hidden font-medium text-center"></div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg transition-colors duration-200">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-600 mt-6">
            Already have an account? <a href="login.html" class="text-blue-600 hover:underline font-medium">Sign in here</a>
        </p>
    </div>

    <!-- Core Scripts -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (Auth.getCurrentUser()) window.location.href = 'index.html';

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm_password').value;
            const errorMsg = document.getElementById('error-msg');

            if (pass !== confirmPass) {
                errorMsg.textContent = "Passwords do not match!";
                errorMsg.classList.remove('hidden');
                return;
            }

            if (Auth.register(user, pass)) {
                window.location.href = 'index.html'; // Auto-login handles the session
            } else {
                errorMsg.textContent = "Username already exists. Try another.";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
